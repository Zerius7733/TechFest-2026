<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upload Resume</title>
    <style>
      :root {
        --bg: #f4f6f5;
        --card: #ffffff;
        --text: #111111;
        --muted: rgba(0, 0, 0, 0.55);
        --border: rgba(0, 0, 0, 0.08);
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.10);
        --radius: 999px;

        --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
      }

      .page {
        min-height: 100%;
        position: relative;
        padding: 24px;
      }

      .back {
        position: absolute;
        top: 20px;
        right: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 18px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        text-decoration: none;
        font-weight: 800;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      }

      .center {
        height: calc(100vh - 48px);
        display: grid;
        place-items: center;
      }

      .stack {
        width: min(860px, 92vw);
        display: grid;
        gap: 20px;
        justify-items: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 4.5vw, 54px);
        font-weight: 900;
        letter-spacing: -0.03em;
      }

      .pill {
        width: min(680px, 92vw);
        height: 160px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        overflow: hidden;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .half {
        display: grid;
        place-items: center;
        font-weight: 900;
        font-size: 34px;
        cursor: pointer;
        user-select: none;
      }

      .half.left {
        background: #ffffff;
      }

      .half.right {
        background: #a9a9a9;
      }

      .split {
        transition: transform 120ms ease, box-shadow 120ms ease;
      }

      .split:hover {
        transform: translateY(-2px);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.12);
      }

      .split:active {
        transform: translateY(0px);
      }

      .pill:hover {
        transform: translateY(-2px);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.12);
      }

      .pill:active {
        transform: translateY(0px);
      }

      .icon {
        width: 80px;
        height: 80px;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.4;
        text-align: center;
      }

      .status {
        min-height: 20px;
        font-size: 14px;
        color: var(--muted);
        text-align: center;
      }

      .error {
        min-height: 20px;
        font-size: 14px;
        color: #b00020;
        text-align: center;
        display: none;
      }

      input[type="file"] {
        display: none;
      }

      /* Success modal */
      .success-modal {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 10000;
      }

      .success-modal.open {
        display: block;
      }

      .success-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
      }

      .success-card {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(420px, 92vw);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.2);
        border-radius: 18px;
        padding: 18px;
        text-align: center;
      }

      .success-title {
        margin: 0 0 8px 0;
        font-size: 18px;
        font-weight: 800;
      }

      .success-text {
        margin: 0 0 16px 0;
        color: rgba(0, 0, 0, 0.65);
        font-size: 14px;
        line-height: 1.4;
      }

      .success-btn {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 800;
        background: #111;
        color: #fff;
        cursor: pointer;
      }

      .error-modal .success-card {
        border-color: rgba(176, 0, 32, 0.18);
      }

      .error-modal .success-title {
        color: #b00020;
      }

      /* Floating Tab Bar */
      .tabbar {
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        width: min(560px, calc(100vw - 28px));
        padding: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        z-index: 999;
      }

      .tabbar a {
        display: grid;
        place-items: center;
        gap: 2px;
        padding: 8px 6px;
        border-radius: 999px;
        text-decoration: none;
        color: var(--text);
        font-weight: 800;
        font-size: 12px;
        opacity: 0.65;
        grid-auto-rows: min-content;
        justify-items: center;
        align-content: center;
      }

      .tabbar a .icon {
        width: auto;
        height: auto;
        font-size: 18px;
        line-height: 1;
      }


      .tabbar a.active {
        background: rgba(0, 0, 0, 0.08);
        opacity: 1;
      }

      /* Prevent content being hidden behind tabbar */
      .page {
        padding-bottom: 96px;
      }

    </style>
  </head>

  <body>
    <div class="page">
      <a class="back" href="#" id="backBtn">Back</a>

      <div class="center">
        <div class="stack">
          <h1>Resume.</h1>

          <div class="pill split" role="group" aria-label="Resume options">
            <div class="half left" id="uploadPill" role="button" tabindex="0" aria-label="Upload resume">
              Upload
            </div>
            <div class="half right" id="useExistingPill" role="button" tabindex="0" aria-label="Use existing resume">
              Use existing
            </div>
          </div>

          <p class="hint">Click the card to select a file.</p>

          <div class="status" id="statusText"></div>
          <div class="error" id="errorText"></div>

          <input id="fileInput" type="file" accept="application/pdf" />
        </div>
      </div>
    </div>

    <!-- Success Modal -->
    <div class="success-modal" id="successModal" aria-hidden="true">
      <div class="success-backdrop" data-close="1"></div>
      <div class="success-card" role="dialog" aria-modal="true" aria-labelledby="successTitle">
        <h2 id="successTitle" class="success-title">Application submitted</h2>
        <p class="success-text">Your application has been recorded successfully.</p>
        <button type="button" class="success-btn" id="successCloseBtn">OK</button>
      </div>
    </div>

    <div class="success-modal error-modal" id="errorModal" aria-hidden="true">
      <div class="success-backdrop" data-close="1"></div>
      <div class="success-card" role="dialog" aria-modal="true" aria-labelledby="errorTitle">
        <h2 id="errorTitle" class="success-title">Duplicate application</h2>
        <p class="success-text">You have already applied for this job.</p>
        <button type="button" class="success-btn" id="errorCloseBtn">OK</button>
      </div>
    </div>

      <!-- Floating Tab Bar -->
      <nav class="tabbar" aria-label="Primary">
        <a href="/" data-tab="home">
          <span class="icon">🏠</span>
          <span>Home</span>
        </a>
        <a href="/results" data-tab="jobs" class="active">
          <span class="icon">💼</span>
          <span>Listings</span>
        </a>
        <a href="/optimize" data-tab="optimize">
          <span class="icon">📄</span>
          <span>Optimize</span>
        </a>
        <a href="/student_profile" data-tab="profile">
          <span class="icon">👤</span>
          <span>Profile</span>
        </a>
      </nav>


    <script>
      function qs(name) {
        return new URLSearchParams(window.location.search).get(name) || "";
      }

      function setStatus(msg) {
        const el = document.getElementById("statusText");
        if (el) el.textContent = msg || "";
      }

      function showError(msg) {
        const el = document.getElementById("errorText");
        if (!el) return;
        el.style.display = "block";
        el.textContent = msg || "Something went wrong.";
      }

      function clearError() {
        const el = document.getElementById("errorText");
        if (!el) return;
        el.style.display = "none";
        el.textContent = "";
      }

      function getToken() {
        return localStorage.getItem("AUTH_TOKEN") || "";
      }

      function authHeaders() {
        const t = getToken();
        return t ? { Authorization: `Bearer ${t}` } : {};
      }

      let CURRENT_USER_ID = null;
      async function getCurrentUserId() {
        if (CURRENT_USER_ID) return CURRENT_USER_ID;
        const res = await fetch("/api/auth/me", { headers: authHeaders() });
        if (!res.ok) {
          throw new Error("Please log in to apply.");
        }
        const data = await res.json();
        CURRENT_USER_ID = data.userId;
        return CURRENT_USER_ID;
      }

      const successModal = document.getElementById("successModal");
      const successCloseBtn = document.getElementById("successCloseBtn");
      const errorModal = document.getElementById("errorModal");
      const errorCloseBtn = document.getElementById("errorCloseBtn");

      function openSuccessModal() {
        if (!successModal) return;
        successModal.classList.add("open");
        successModal.setAttribute("aria-hidden", "false");
      }

      function closeSuccessModal() {
        if (!successModal) return;
        successModal.classList.remove("open");
        successModal.setAttribute("aria-hidden", "true");
      }

      function openErrorModal() {
        if (!errorModal) return;
        errorModal.classList.add("open");
        errorModal.setAttribute("aria-hidden", "false");
      }

      function closeErrorModal() {
        if (!errorModal) return;
        errorModal.classList.remove("open");
        errorModal.setAttribute("aria-hidden", "true");
      }

      if (successCloseBtn) successCloseBtn.addEventListener("click", closeSuccessModal);
      if (errorCloseBtn) errorCloseBtn.addEventListener("click", closeErrorModal);
      document.addEventListener("click", (e) => {
        const t = e.target;
        if (t && t.getAttribute && t.getAttribute("data-close") === "1") {
          closeSuccessModal();
          closeErrorModal();
        }
      });

      const jobId = qs("id");
      const q = qs("q");

      // Back button: return to details page (preferred), fallback to results
      const backBtn = document.getElementById("backBtn");
      if (backBtn) {
        backBtn.addEventListener("click", (e) => {
          e.preventDefault();
          if (jobId) {
            const params = new URLSearchParams();
            params.set("id", jobId);
            if (q) params.set("q", q);
            window.location.href = `/job?${params.toString()}`;
            return;
          }
          if (q) {
            window.location.href = `/results?q=${encodeURIComponent(q)}`;
            return;
          }
          window.location.href = "/results";
        });
      }

      const pill = document.getElementById("uploadPill");
      const fileInput = document.getElementById("fileInput");

      function openPicker() {
        clearError();
        if (!jobId) {
          showError("Missing job id in URL. Expected /apply?id=<job_id>");
          return;
        }
        if (fileInput) fileInput.click();
      }

      async function applyWithFile(file) {
        clearError();

        setStatus("Uploading...");
        if (pill) pill.style.pointerEvents = "none";

        try {
          const userId = await getCurrentUserId();
          const form = new FormData();
          form.append("resume", file);

          const res = await fetch(
            `/api/applications/apply?job_id=${encodeURIComponent(jobId)}&user_id=${encodeURIComponent(userId)}`,
            {
              method: "POST",
              headers: {
                ...authHeaders(),
              },
              body: form,
            }
          );

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            const detail = data && data.detail ? String(data.detail) : `HTTP ${res.status}`;
            if (res.status === 409 || /duplicate/i.test(detail)) {
              setStatus("");
              openErrorModal();
              return;
            }
            throw new Error(detail);
          }

          setStatus("Application submitted.");
          openSuccessModal();
        } catch (err) {
          setStatus("");
          showError(err.message || "Upload failed.");
        } finally {
          if (pill) pill.style.pointerEvents = "auto";
        }
      }

      async function uploadSelectedFile() {
        const file = fileInput && fileInput.files ? fileInput.files[0] : null;
        if (!file) return;
        await applyWithFile(file);
      }

      if (pill) {
        pill.addEventListener("click", openPicker);
        pill.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") openPicker();
        });
      }

      if (fileInput) {
        fileInput.addEventListener("change", uploadSelectedFile);
      }

      const useExistingPill = document.getElementById("useExistingPill");

      if (useExistingPill) {
        useExistingPill.addEventListener("click", async () => {
          clearError();
          if (!jobId) {
            showError("Missing job id in URL. Expected /apply?id=<job_id>");
            return;
          }
          try {
            setStatus("Using existing resume...");
            const res = await fetch("/api/resume/me", { headers: authHeaders() });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || !data || !data.has_resume || !data.file_url) {
              throw new Error("No resume has been uploaded yet.");
            }

            const fileRes = await fetch(data.file_url);
            if (!fileRes.ok) {
              throw new Error("Failed to load stored resume.");
            }

            const blob = await fileRes.blob();
            const filename = data.resume_name || "resume.pdf";
            const file = new File([blob], filename, { type: blob.type || "application/pdf" });

            await applyWithFile(file);
          } catch (err) {
            setStatus("");
            showError(err.message || "No resume has been uploaded yet.");
          }
        });
      }

    </script>
  </body>
</html>
