<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Results</title>
  <style>
    :root {
      --bg: #F4F6F5;
      --text: #111111;
      --muted: rgba(0, 0, 0, 0.45);
      --card: #ffffff;
      --line: rgba(0, 0, 0, 0.08);
      --chip: rgba(0, 0, 0, 0.06);
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .topbar {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .title {
      font-size: 34px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0 18px;
    }

    .chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--chip);
      font-size: 14px;
      color: rgba(0, 0, 0, 0.65);
      user-select: none;
    }

    .chip.active {
      background: #111;
      color: #fff;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 18px 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.08);
      flex: 0 0 auto;
    }

    .meta-text {
      min-width: 0;
    }

    .company {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .location {
      font-size: 13px;
      color: var(--muted);
      margin: 2px 0 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .save {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
    }

    .job-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 10px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 12px 0;
    }

    .bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
    }

    .source {
      font-size: 13px;
      color: var(--muted);
    }

    .salary {
      font-size: 16px;
      font-weight: 700;
      text-align: right;
    }

    .salary small {
      display: block;
      font-weight: 600;
      color: var(--muted);
      margin-top: 2px;
    }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    a.card-link {
      color: inherit;
      text-decoration: none;
      display: block;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="topbar">
      <h1 class="title">Results</h1>
      <div class="sub" id="subText"></div>
    </div>

    <div class="chips" id="chips">
      <div class="chip active" data-filter="for-you">For You</div>
      <div class="chip" data-filter="full-time">Full-Time</div>
      <div class="chip" data-filter="internship">Internship</div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <script>
    function qs(name) {
      return new URLSearchParams(window.location.search).get(name) || "";
    }

    function esc(s) {
      return (s ?? "").toString();
    }

    function card(job) {
      const title = esc(job.title) || "Untitled Role";
      const company = esc(job.company) || "Unknown Company";
      const location = esc(job.location) || "Unknown Location";
      const type = esc(job.employment_type) || "—";
      const salary = esc(job.salary) || "—";
      const url = esc(job.url) || "";
      const jobId = esc(job.id) || "";

      const tags = [];
      if (type !== "—") tags.push(type);
      tags.push("—");
      tags.push(location);

      const content = `
          <div class="card">
            <div class="card-top">
              <div class="meta">
                <div class="logo"></div>
                <div class="meta-text">
                  <p class="company">${company}</p>
                  <p class="location">${location}</p>
                </div>
              </div>
              <button class="save" type="button" aria-label="Save">
                &#128278;
              </button>
            </div>

            <div class="job-title">${title}</div>

            <div class="tags">
              ${tags.map(t => `<span>${t}</span>`).join("")}
            </div>

            <div class="divider"></div>

            <div class="bottom">
              <div class="source">Source: ${esc(job.source) || "unknown"}</div>
              <div class="salary">
                ${salary}
                <small>/Month</small>
              </div>
            </div>
          </div>
        `;

      // Prefer going to your internal details page
      if (jobId) {
        return `<a class="card-link" href="job.html?id=${encodeURIComponent(jobId)}">${content}</a>`;
      }

      // Fallback: if backend didn't provide an id, open source URL if available
      if (url) {
        return `<a class="card-link" href="${url}" target="_blank" rel="noopener noreferrer">${content}</a>`;
      }

      return content;

    }

    let CURRENT_Q = "";
    const CACHE = new Map();

    function renderResults(results) {
      const grid = document.getElementById("grid");
      grid.innerHTML = results.length
        ? results.map(card).join("")
        : `<div class="empty">No matching jobs for this filter.</div>`;
    }

    async function fetchAndRender(filterKey) {
      const key = filterKey || "for-you";

      // optional cache so switching chips is instant
      if (CACHE.has(key)) {
        renderResults(CACHE.get(key));
        return;
      }

      const params = new URLSearchParams();
      params.set("q", CURRENT_Q);
      params.set("limit", "20");

      // backend SQL filters
      if (key === "remote" || key === "internship" || key === "full-time") {
        params.set("filter", key);
      }

      // "new" requires backend support (sort param). If you haven't added it yet,
      // leave this out and it will behave like "for-you".
      if (key === "new") {
        params.set("sort", "new");
      }

      const res = await fetch(`/api/search?${params.toString()}`);
      const data = await res.json();
      const results = Array.isArray(data.results) ? data.results : [];

      CACHE.set(key, results);
      renderResults(results);
    }


    function initChips() {
      const chipsEl = document.getElementById("chips");
      if (!chipsEl) return;

      chipsEl.addEventListener("click", (e) => {
        const chip = e.target.closest(".chip");
        if (!chip) return;

        // toggle active UI
        chipsEl.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
        chip.classList.add("active");

        // apply filter
        const key = chip.dataset.filter || "for-you";
        CACHE.clear(); // remove this line if you want caching across chips
        fetchAndRender(key);

      });
    }


    async function main() {
      const q = qs("q").trim();
      const sub = document.getElementById("subText");
      const grid = document.getElementById("grid");

      if (!q) {
        sub.textContent = "No query provided";
        grid.innerHTML = `<div class="empty">Type a search query from the home page.</div>`;
        return;
      }

      sub.textContent = `Searching for: "${q}"`;
      initChips();
      CURRENT_Q = q;
      CACHE.clear();

      await fetchAndRender("for-you");
    }

    main().catch((e) => {
      document.getElementById("grid").innerHTML = `<div class="empty">Failed to load results.</div>`;
      console.error(e);
    });
  </script>
</body>

</html>
