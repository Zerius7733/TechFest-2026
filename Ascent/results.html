<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Results</title>
    <style>
      :root {
        --bg: #f4f6f5;
        --text: #111111;
        --muted: rgba(0, 0, 0, 0.45);
        --card: #ffffff;
        --line: rgba(0, 0, 0, 0.08);
        --chip: rgba(0, 0, 0, 0.06);
        --font:
          ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
      }

      /* Auth modal */
      .auth-modal {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 10000;
      }

      .auth-modal.open {
        display: block;
      }

      .auth-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
      }

      .auth-card {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(420px, 92vw);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.20);
        border-radius: 18px;
        padding: 18px;
      }

      .auth-title {
        margin: 0 0 8px 0;
        font-size: 18px;
        font-weight: 700;
      }

      .auth-text {
        margin: 0 0 14px 0;
        color: rgba(0, 0, 0, 0.65);
        font-size: 14px;
        line-height: 1.4;
      }

      .auth-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .auth-btn {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      .auth-primary {
        background: #111;
        color: #fff;
      }

      .auth-secondary {
        background: rgba(0, 0, 0, 0.08);
        color: rgba(0, 0, 0, 0.75);
      }


      .page {
        max-width: 820px;
        margin: 0 auto;
        padding: 28px 16px 60px;
      }

      .search-row {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        margin: 10px 0 6px;
      }

      .search {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .search-input {
        width: min(520px, 72vw);
        height: 44px;
        border: none;
        background: transparent;
        padding: 0 6px;
        font-size: 20px;
        outline: none;
        color: var(--text);
      }

      .search-input:focus {
        border-color: rgba(0, 0, 0, 0.18);
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
      }

      .search-btn {
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: none;
        background: transparent;
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .search-icon {
        font-size: 18px;
        line-height: 1;
        color: rgba(0, 0, 0, 0.75);
        transform: translateY(-1px);
      }

      @media (max-width: 520px) {
        .search-input {
          width: 0;
          opacity: 0;
          pointer-events: none;
          transition: width 180ms ease, opacity 180ms ease;
        }

        .search.open .search-input {
          width: 72vw;
          opacity: 1;
          pointer-events: auto;
        }
      }


      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .title {
        font-size: 34px;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0;
      }

      .title-link {
        color: inherit;
        text-decoration: none;
      }

      .title-link:hover {
        text-decoration: underline;
        text-underline-offset: 6px;
      }


      .sub {
        color: var(--muted);
        font-size: 14px;
      }

      .sub-inline {
        flex-direction: row-reverse;
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: flex-end;
        margin-left: auto;
        text-align: right;
        white-space: nowrap;
      }


      .sub-search-btn {
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        display: grid;
        place-items: center;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      }


      .sub-search-btn span {
        font-size: 30px;
        color: rgba(0, 0, 0, 0.7);
        transform: translateY(-1px);
      }

      .sub-form {
        display: inline;
      }

      .sub-q {
        font: inherit;
        color: var(--muted);
        border: none;
        background: transparent;
        padding: 0;
        width: 220px;
        outline: none;
        text-align: right;
        width: 180px;
      }

      .sub-q:focus {
        color: var(--text);
      }

      /* make it feel clickable even before focus */
      .sub-q:hover {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      @media (max-width: 520px) {
        .sub-q {
          width: 140px;
        }
      }


      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 14px 0 18px;
      }

      .chip {
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--chip);
        font-size: 14px;
        color: rgba(0, 0, 0, 0.65);
        user-select: none;
      }

      .chip.active {
        background: #111;
        color: #fff;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .card {
        background: var(--card);
        border-radius: 20px;
        padding: 18px 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        border: 1px solid rgba(0, 0, 0, 0.04);
      }

      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .meta {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .logo {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.08);
        flex: 0 0 auto;
      }

      .meta-text {
        min-width: 0;
      }

      .company {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .location {
        font-size: 13px;
        color: var(--muted);
        margin: 2px 0 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .save {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        background: #fff;
        cursor: pointer;
      }

      .job-title {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 10px;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 12px;
      }

      .divider {
        height: 1px;
        background: var(--line);
        margin: 12px 0;
      }

      .bottom {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 14px;
      }

      .source {
        font-size: 13px;
        color: var(--muted);
      }

      .salary {
        font-size: 16px;
        font-weight: 700;
        text-align: right;
      }

      .salary small {
        display: block;
        font-weight: 600;
        color: var(--muted);
        margin-top: 2px;
      }

      .empty {
        padding: 28px;
        color: var(--muted);
        text-align: center;
      }

      a.card-link {
        color: inherit;
        text-decoration: none;
        display: block;
      }

      /* Floating tab bar (centered pill) */
      .tabbar {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.10);
        border-radius: 999px;
        padding: 10px 14px;
        display: flex;
        gap: 10px;
        z-index: 9999;
      }

      .tabbar a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        text-decoration: none;
        color: rgba(0, 0, 0, 0.65);
        font-size: 14px;
        font-weight: 600;
        line-height: 1;
        user-select: none;
      }

      .tabbar a .icon {
        width: 18px;
        height: 18px;
        display: inline-grid;
        place-items: center;
        font-size: 16px;
      }

      .tabbar a.active {
        background: #111;
        color: #fff;
      }

      /* avoid content hiding behind tabbar */
      .page {
        padding-bottom: 120px;
      }

    </style>
  </head>

  <body>
    <div class="page">
      <div class="topbar">
        <h1 class="title"><a href="/" class="title-link">Results</a></h1>
        <div class="sub sub-inline" id="subTextWrap">
          <button class="sub-search-btn" id="subSearchBtn" type="button" aria-label="Search">
            <span aria-hidden="true">⌕</span>
          </button>
          <form id="searchForm" class="sub-form" autocomplete="off">
            <input
              id="searchInput"
              class="sub-q"
              type="text"
              name="q"
              aria-label="Search query"
            />
          </form>
        </div>
      </div>

      <div class="chips" id="chips">
        <div class="chip active" data-filter="for-you">For You</div>
        <div class="chip" data-filter="full-time">Full-Time</div>
        <div class="chip" data-filter="internship">Internship</div>
      </div>

      <div class="grid" id="grid"></div>
      <!-- Floating Tab Bar -->
      <nav class="tabbar" aria-label="Primary">
        <a href="/" data-tab="home">
          <span class="icon">🏠</span>
          <span>Home</span>
        </a>
        <a href="/results" data-tab="jobs">
          <span class="icon">💼</span>
          <span>Listings</span>
        </a>
        <a href="/job" data-tab="profile">
          <span class="icon">👤</span>
          <span>Profile</span>
        </a>
      </nav>

      <!-- Auth Modal -->
      <div class="auth-modal" id="authModal" aria-hidden="true">
        <div class="auth-backdrop" data-close="1"></div>
        <div class="auth-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
          <h2 id="authTitle" class="auth-title">Login required</h2>
          <p class="auth-text">Please log in or sign up to access this section.</p>
          <div class="auth-actions">
            <button type="button" class="auth-btn auth-secondary" id="authCloseBtn">Cancel</button>
            <a class="auth-btn auth-primary" id="authLoginBtn" href="/login">Log in</a>
            <a class="auth-btn auth-primary" id="authSignupBtn" href="/signup">Sign up</a>
          </div>
        </div>
      </div>



    </div>

    <script>
      function qs(name) {
        return new URLSearchParams(window.location.search).get(name) || "";
      }

      function esc(s) {
        return (s ?? "").toString();
      }

      function card(job) {
        const title = esc(job.title) || "Untitled Role";
        const company = esc(job.company) || "Unknown Company";
        const location = esc(job.location) || "Unknown Location";
        const type = esc(job.employment_type) || "—";
        const salary = esc(job.salary) || "—";
        const url = esc(job.url) || "";
        const jobId = esc(job.id) || "";

        const tags = [];
        if (type !== "—") tags.push(type);
        tags.push("—");
        tags.push(location);

        const content = `
          <div class="card">
            <div class="card-top">
              <div class="meta">
                <div class="logo"></div>
                <div class="meta-text">
                  <p class="company">${company}</p>
                  <p class="location">${location}</p>
                </div>
              </div>
              <button class="save" type="button" aria-label="Save">
                &#128278;
              </button>
            </div>

            <div class="job-title">${title}</div>

            <div class="tags">
              ${tags.map((t) => `<span>${t}</span>`).join("")}
            </div>

            <div class="divider"></div>

            <div class="bottom">
              <div class="source">Source: ${esc(job.source) || "unknown"}</div>
              <div class="salary">
                ${salary}
                <small>/Month</small>
              </div>
            </div>
          </div>
        `;

      // Prefer going to your internal details page
      if (jobId) {
        return `<a class="card-link" href="/job?id=${encodeURIComponent(jobId)}&q=${encodeURIComponent(CURRENT_Q)}">${content}</a>`;

      }

        // Fallback: if backend didn't provide an id, open source URL if available
        if (url) {
          return `<a class="card-link" href="${url}" target="_blank" rel="noopener noreferrer">${content}</a>`;
        }

        return content;
      }

      let CURRENT_Q = "";
      const CACHE = new Map();

      function renderResults(results) {
        const grid = document.getElementById("grid");
        grid.innerHTML = results.length
          ? results.map(card).join("")
          : `<div class="empty">No matching jobs for this filter.</div>`;
      }

      async function fetchAndRender(filterKey) {
        const key = filterKey || "for-you";

        if (CACHE.has(key)) {
          const cached = CACHE.get(key);
          renderResults(cached);
          return cached;
        }

        const params = new URLSearchParams();
        if (CURRENT_Q && CURRENT_Q.trim().length > 0) {
          params.set("q", CURRENT_Q);
        }
        params.set("limit", "20");

        // backend SQL filters
        if (key === "remote" || key === "internship" || key === "full-time") {
          params.set("filter", key);
        }

        // "new" requires backend support (sort param). If you haven't added it yet,
        // leave this out and it will behave like "for-you".
        if (key === "new") {
          params.set("sort", "new");
        }

        const res = await fetch(`/api/search?${params.toString()}`);
        const data = await res.json();
        const results = Array.isArray(data.results) ? data.results : [];

        CACHE.set(key, results);
        renderResults(results);
        return results;
      }

      function initChips() {
        const chipsEl = document.getElementById("chips");
        if (!chipsEl) return;

        chipsEl.addEventListener("click", (e) => {
          const chip = e.target.closest(".chip");
          if (!chip) return;

          // toggle active UI
          chipsEl
            .querySelectorAll(".chip")
            .forEach((c) => c.classList.remove("active"));
          chip.classList.add("active");

          // apply filter
          const key = chip.dataset.filter || "for-you";
          CACHE.clear(); // remove this line if you want caching across chips
          fetchAndRender(key);
        });
      }

      function initTopSearch() {
        const form = document.getElementById("searchForm");
        const input = document.getElementById("searchInput");
        const iconBtn = document.getElementById("subSearchBtn");
        if (!form || !input) return;

        // Prefill with current query
        input.value = CURRENT_Q || "";

        // Make the “software” text easy to edit
        input.addEventListener("focus", () => {
          input.select();
        });

        // Submit search when user presses Enter in the query
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          const value = (input.value || "").trim();
          if (!value) return;
          window.location.href = `/results?q=${encodeURIComponent(value)}`;
        });

        // Clicking the icon focuses the input
        if (iconBtn) {
          iconBtn.addEventListener("click", () => {
            input.focus();
          });
        }
      }

      function setActiveTab() {
        document.querySelectorAll(".tabbar a").forEach((a) => a.classList.remove("active"));
        const jobs = document.querySelector('.tabbar a[data-tab="jobs"]');
        if (jobs) jobs.classList.add("active");
      }

      setActiveTab();

      // Basic auth flag (placeholder for future real auth)
      function isLoggedIn() {
        return !!localStorage.getItem("AUTH_TOKEN");
      }

      const authModal = document.getElementById("authModal");
      const authCloseBtn = document.getElementById("authCloseBtn");

      function openAuthModal() {
        if (!authModal) return;
        authModal.classList.add("open");
        authModal.setAttribute("aria-hidden", "false");
      }

      function closeAuthModal() {
        if (!authModal) return;
        authModal.classList.remove("open");
        authModal.setAttribute("aria-hidden", "true");
      }

      if (authCloseBtn) authCloseBtn.addEventListener("click", closeAuthModal);
      document.addEventListener("click", (e) => {
        const t = e.target;
        if (t && t.getAttribute && t.getAttribute("data-close") === "1") {
          closeAuthModal();
        }
      });

      // Guard tabs that should require auth (choose what you want)
      const authRequiredTabs = new Set(["profile", "jobs"]);

      document.querySelectorAll(".tabbar a").forEach((a) => {
        a.addEventListener("click", (e) => {
          const tab = a.getAttribute("data-tab");
          if (!tab) return;

          if (authRequiredTabs.has(tab) && !isLoggedIn()) {
            e.preventDefault();
            openAuthModal();
          }
        });
      });


      async function main() {
        const q = qs("q").trim();
        const sub = document.getElementById("subTextWrap");
        const grid = document.getElementById("grid");

        if (!q) {
          initChips();
          initTopSearch();

          // First try: no query (backend may support default listings)
          CURRENT_Q = "";
          CACHE.clear();
          let results = await fetchAndRender("for-you");

          // If backend returns nothing, fall back to a random “seed” query
          if (!results || results.length === 0) {
            const seeds = [
              "software engineer",
              "data analyst",
              "intern",
              "product",
              "ui ux",
              "cybersecurity",
              "machine learning"
            ];
            CURRENT_Q = seeds[Math.floor(Math.random() * seeds.length)];

            const input = document.getElementById("searchInput");
            if (input) input.value = CURRENT_Q;

            CACHE.clear();
            await fetchAndRender("for-you");
          }

          return;
        }

        initChips();
        CURRENT_Q = q;
        initTopSearch();

        CACHE.clear();

        await fetchAndRender("for-you");
      }

      main().catch((e) => {
        document.getElementById("grid").innerHTML =
          `<div class="empty">Failed to load results.</div>`;
        console.error(e);
      });
    </script>
  </body>
</html>
