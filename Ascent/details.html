<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Details</title>
    <style>
        :root {
            --bg: #f4f6f5;
            --card: #ffffff;
            --text: #111111;
            --muted: rgba(0, 0, 0, 0.55);
            --border: rgba(0, 0, 0, 0.06);
            --shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
            --radius: 28px;

            --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
                "Apple Color Emoji", "Segoe UI Emoji";
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
        }

        .wrap {
            min-height: 100%;
            display: grid;
            place-items: center;
            padding: 28px 16px;
        }

        .shell {
            width: min(980px, 92vw);
        }

        .top-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 26px 28px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
        }

        .identity {
            display: flex;
            gap: 18px;
            align-items: center;
            min-width: 0;
        }

        .logo {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.22);
            flex: 0 0 auto;
        }

        .headings {
            min-width: 0;
        }

        .company {
            font-weight: 700;
            font-size: 22px;
            margin: 0 0 6px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .title {
            font-weight: 800;
            font-size: 34px;
            margin: 0;
            line-height: 1.12;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .salary {
            font-weight: 700;
            font-size: 18px;
            color: var(--text);
            white-space: nowrap;
        }

        .details-card {
            margin-top: 22px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 26px 28px;
        }

        .section-label {
            font-weight: 800;
            font-size: 22px;
            margin: 0 0 6px 0;
        }

        .section-text {
            margin: 0 0 18px 0;
            color: var(--text);
            font-size: 18px;
            line-height: 1.55;
            white-space: pre-wrap;
            transition: max-height 0.25s ease;

        }

        .muted {
            color: var(--muted);
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 14px 0 18px 0;
        }

        .pill {
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.03);
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.75);
        }

        .actions {
            margin-top: 18px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .actions .push-right {
            margin-left: auto;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 999px;
            padding: 10px 14px;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text);
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .btn.primary {
            border-color: rgba(0, 0, 0, 0.18);
        }

        /* Auth modal (tabbar prompt) */
        .auth-modal {
            position: fixed;
            inset: 0;
            display: none;
            z-index: 10000;
        }

        .auth-modal.open {
            display: block;
        }

        .auth-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
        }

        .auth-card {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(420px, 92vw);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.20);
            border-radius: 18px;
            padding: 18px;
        }

        .auth-title {
            margin: 0 0 8px 0;
            font-size: 18px;
            font-weight: 700;
        }

        .auth-text {
            margin: 0 0 14px 0;
            color: rgba(0, 0, 0, 0.65);
            font-size: 14px;
            line-height: 1.4;
        }

        .auth-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .auth-btn {
            appearance: none;
            border: 0;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .auth-primary {
            background: #111;
            color: #fff;
        }

        .auth-secondary {
            background: rgba(0, 0, 0, 0.08);
            color: rgba(0, 0, 0, 0.75);
        }

        .error {
            margin-top: 12px;
            font-size: 14px;
            color: #b00020;
        }

        @media (max-width: 720px) {
            .top-card {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .salary {
                justify-self: start;
            }

            .title {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="shell">
            <div class="top-card">
                <div class="identity">
                    <div class="logo" aria-hidden="true"></div>
                    <div class="headings">
                        <p class="company" id="companyName">[Company Name]</p>
                        <h1 class="title" id="jobTitle">Job Title</h1>
                    </div>
                </div>
                <div class="salary" id="salaryText">$0 / month</div>
            </div>

            <div class="details-card">
                <p class="section-label">Overview:</p>
                <p class="section-text" id="overviewText" class="muted">Loading...</p>

                <div class="meta-row" id="metaRow" style="display: none;"></div>

                <p class="section-label">Description:</p>
                <div class="section-text" id="descriptionText"></div>
                <button class="btn" id="toggleDescBtn" style="display:none;">Show more</button>


                <div class="actions">
                    <a class="btn primary" id="applylink" href="" target="_blank" rel="noreferrer noopener">Apply</a>
                    <a class="btn primary" id="roadmapLink" href="#">Roadmap</a>
                    <a class="btn push-right" href="#" id="backBtn">Back to results</a>

                </div>

                <div class="error" id="errorBox" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="auth-modal" id="authModal" aria-hidden="true">
        <div class="auth-backdrop" data-close="1"></div>
        <div class="auth-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
            <h2 id="authTitle" class="auth-title">Login required</h2>
            <p class="auth-text">Please log in or sign up to access this section.</p>
            <div class="auth-actions">
                <button type="button" class="auth-btn auth-secondary" id="authCloseBtn">Cancel</button>
                <a class="auth-btn auth-primary" id="authLoginBtn" href="/login">Log in</a>
                <a class="auth-btn auth-primary" id="authSignupBtn" href="/signup">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        function qs(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }

        function setText(id, value, fallback = "") {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = value ?? fallback;
        }

        function showError(msg) {
            const box = document.getElementById("errorBox");
            if (!box) return;
            box.style.display = "block";
            box.textContent = msg;
        }

        function addPill(container, text) {
            const pill = document.createElement("span");
            pill.className = "pill";
            pill.textContent = text;
            container.appendChild(pill);
        }

        // Basic auth flag (placeholder for future real auth)
        function isLoggedIn() {
            return !!localStorage.getItem("AUTH_TOKEN");
        }

        const authModal = document.getElementById("authModal");
        const authCloseBtn = document.getElementById("authCloseBtn");

        function openAuthModal() {
            if (!authModal) return;
            authModal.classList.add("open");
            authModal.setAttribute("aria-hidden", "false");
        }

        function closeAuthModal() {
            if (!authModal) return;
            authModal.classList.remove("open");
            authModal.setAttribute("aria-hidden", "true");
        }

        if (authCloseBtn) authCloseBtn.addEventListener("click", closeAuthModal);
        document.addEventListener("click", (e) => {
            const t = e.target;
            if (t && t.getAttribute && t.getAttribute("data-close") === "1") {
                closeAuthModal();
            }
        });
        let FULL_DESCRIPTION = "";
        let DESC_EXPANDED = false;
        const DESC_PREVIEW_LEN = 600; // adjust to taste

        async function loadJob() {
            const jobId = qs("id");
            if (!jobId) {
                showError("Missing job id. Make sure results.html links to job?id=<JOB_ID>.");
                return;
            }

            // Change this if your API base path differs
            const endpoint = `/api/jobs/${encodeURIComponent(jobId)}`;

            try {
                const res = await fetch(endpoint, { method: "GET" });
                if (!res.ok) {
                    throw new Error(`Failed to load job (${res.status}). Endpoint: ${endpoint}`);
                }

                const job = await res.json();

                // Header (company + title come from the selected record in DB)
                setText("companyName", job.company, "[Company Name]");
                setText("jobTitle", job.title, "Job Title");

                // Salary
                const salary = job.salary && String(job.salary).trim() ? job.salary : "—";
                setText("salaryText", salary);

                // Overview (short summary)
                // If you have a dedicated overview field, use it. Else derive from description.
                const desc = job.description ? String(job.description) : "";
                const overview =
                    job.overview ||
                    (desc.length > 180 ? desc.slice(0, 180).trim() + "..." : desc.trim()) ||
                    "—";
                setText("overviewText", overview);

                // Description
                // Description (with show more / less)
                FULL_DESCRIPTION = desc.trim() || "—";

                const descEl = document.getElementById("descriptionText");
                const toggleBtn = document.getElementById("toggleDescBtn");

                if (FULL_DESCRIPTION.length > DESC_PREVIEW_LEN) {
                    DESC_EXPANDED = false;
                    descEl.textContent = FULL_DESCRIPTION.slice(0, DESC_PREVIEW_LEN).trim() + "…";
                    toggleBtn.style.display = "inline-flex";
                    toggleBtn.textContent = "Show more";
                } else {
                    descEl.textContent = FULL_DESCRIPTION;
                    toggleBtn.style.display = "none";
                }


                // Meta pills
                const metaRow = document.getElementById("metaRow");
                metaRow.innerHTML = "";
                let hasMeta = false;

                if (job.location) {
                    addPill(metaRow, job.location);
                    hasMeta = true;
                }
                if (job.locationType) {
                    addPill(metaRow, job.locationType);
                    hasMeta = true;
                }
                if (job.type) {
                    addPill(metaRow, job.type);
                    hasMeta = true;
                }
                if (job.startDate) {
                    addPill(metaRow, `Start: ${job.startDate}`);
                    hasMeta = true;
                }

                metaRow.style.display = hasMeta ? "flex" : "none";

                // Apply link -> go to internal upload page
                const applyLink = document.getElementById("applylink");
                if (applyLink) {
                const q = qs("q") || "";
                const params = new URLSearchParams();
                params.set("id", String(jobId));
                if (q) params.set("q", q);

                applyLink.href = `/apply?${params.toString()}`;
                applyLink.removeAttribute("target");
                applyLink.removeAttribute("rel");
                }

                // Roadmap link -> job-specific roadmap
                const roadmapLink = document.getElementById("roadmapLink");
                if (roadmapLink) {
                const q = qs("q") || "";
                const params = new URLSearchParams();
                params.set("id", String(jobId));
                if (q) params.set("q", q);

                roadmapLink.href = `/roadmap?${params.toString()}`;
                }

            } catch (err) {
                showError(err.message || "Unknown error loading job.");
                setText("overviewText", "—");
                setText("descriptionText", "—");
            }
        }
        // Back to results handler (preserve search query)
        const backBtn = document.getElementById("backBtn");
        if (backBtn) {
            backBtn.addEventListener("click", (e) => {
                e.preventDefault();

                const q = qs("q");
                if (q) {
                    window.location.href = `/results?q=${encodeURIComponent(q)}`;
                } else {
                    window.location.href = "/results";
                }
            });
        }

        // Apply button should require login
        const applyBtn = document.getElementById("applylink");
        if (applyBtn) {
            applyBtn.addEventListener("click", (e) => {
                if (!isLoggedIn()) {
                    e.preventDefault();
                    openAuthModal();
                }
            });
        }
        const toggleBtn = document.getElementById("toggleDescBtn");
        const descEl = document.getElementById("descriptionText");

        if (toggleBtn) {
            toggleBtn.addEventListener("click", () => {
                DESC_EXPANDED = !DESC_EXPANDED;

                if (DESC_EXPANDED) {
                    descEl.textContent = FULL_DESCRIPTION;
                    toggleBtn.textContent = "Show less";
                } else {
                    descEl.textContent =
                        FULL_DESCRIPTION.slice(0, DESC_PREVIEW_LEN).trim() + "…";
                    toggleBtn.textContent = "Show more";
                }
            });
        }

        loadJob();
    </script>
</body>

</html>
