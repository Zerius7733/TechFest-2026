<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Results</title>
    <style>
      :root {
        --bg: #F4F6F5;
        --text: #111111;
        --muted: rgba(0, 0, 0, 0.45);
        --card: #ffffff;
        --line: rgba(0, 0, 0, 0.08);
        --chip: rgba(0, 0, 0, 0.06);
        --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      }

      html, body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
      }

      .page {
        max-width: 820px;
        margin: 0 auto;
        padding: 28px 16px 60px;
      }

      .topbar {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .title {
        font-size: 34px;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0;
      }

      .sub {
        color: var(--muted);
        font-size: 14px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 14px 0 18px;
      }

      .chip {
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--chip);
        font-size: 14px;
        color: rgba(0,0,0,0.65);
        user-select: none;
      }

      .chip.active {
        background: #111;
        color: #fff;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .card {
        background: var(--card);
        border-radius: 20px;
        padding: 18px 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.04);
      }

      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .meta {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .logo {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        background: rgba(0,0,0,0.08);
        flex: 0 0 auto;
      }

      .meta-text {
        min-width: 0;
      }

      .company {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .location {
        font-size: 13px;
        color: var(--muted);
        margin: 2px 0 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .save {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        background: #fff;
        cursor: pointer;
      }

      .job-title {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 10px;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 12px;
      }

      .divider {
        height: 1px;
        background: var(--line);
        margin: 12px 0;
      }

      .bottom {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 14px;
      }

      .source {
        font-size: 13px;
        color: var(--muted);
      }

      .salary {
        font-size: 16px;
        font-weight: 700;
        text-align: right;
      }

      .salary small {
        display: block;
        font-weight: 600;
        color: var(--muted);
        margin-top: 2px;
      }

      .empty {
        padding: 28px;
        color: var(--muted);
        text-align: center;
      }

      a.card-link {
        color: inherit;
        text-decoration: none;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="topbar">
        <h1 class="title">Results</h1>
        <div class="sub" id="subText"></div>
      </div>

      <div class="chips">
        <div class="chip active">For You</div>
        <div class="chip">New</div>
        <div class="chip">Full-Time</div>
        <div class="chip">Remote</div>
        <div class="chip">Internship</div>
      </div>

      <div class="grid" id="grid"></div>
    </div>

    <script>
      function qs(name) {
        return new URLSearchParams(window.location.search).get(name) || "";
      }

      function esc(s) {
        return (s ?? "").toString();
      }

      function card(job) {
        const title = esc(job.title) || "Untitled Role";
        const company = esc(job.company) || "Unknown Company";
        const location = esc(job.location) || "Unknown Location";
        const type = esc(job.employment_type) || "—";
        const salary = esc(job.salary) || "—";
        const url = esc(job.url) || "";

        const tags = [];
        if (type !== "—") tags.push(type);
        tags.push("—");
        tags.push(location);

        const content = `
          <div class="card">
            <div class="card-top">
              <div class="meta">
                <div class="logo"></div>
                <div class="meta-text">
                  <p class="company">${company}</p>
                  <p class="location">${location}</p>
                </div>
              </div>
              <button class="save" type="button" aria-label="Save">
                &#128278;
              </button>
            </div>

            <div class="job-title">${title}</div>

            <div class="tags">
              ${tags.map(t => `<span>${t}</span>`).join("")}
            </div>

            <div class="divider"></div>

            <div class="bottom">
              <div class="source">Source: ${esc(job.source) || "unknown"}</div>
              <div class="salary">
                ${salary}
                <small>/Month</small>
              </div>
            </div>
          </div>
        `;

        if (url) {
          return `<a class="card-link" href="${url}" target="_blank" rel="noopener noreferrer">${content}</a>`;
        }
        return content;
      }

      async function main() {
        const q = qs("q").trim();
        const sub = document.getElementById("subText");
        const grid = document.getElementById("grid");

        if (!q) {
          sub.textContent = "No query provided";
          grid.innerHTML = `<div class="empty">Type a search query from the home page.</div>`;
          return;
        }

        sub.textContent = `Searching for: "${q}"`;

        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&limit=20`);
        const data = await res.json();

        if (!data.results || data.results.length === 0) {
          grid.innerHTML = `<div class="empty">No matching jobs found.</div>`;
          return;
        }

        grid.innerHTML = data.results.map(card).join("");
      }

      main().catch((e) => {
        document.getElementById("grid").innerHTML = `<div class="empty">Failed to load results.</div>`;
        console.error(e);
      });
    </script>
  </body>
</html>
