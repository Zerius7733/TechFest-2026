<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Find your dream job</title>
    <style>
      :root {
        --bg: #F4F6F5;
        --text: #111111;
        --muted: rgba(0, 0, 0, 0.35);
        --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
      }

      .wrap {
        height: 100%;
        display: grid;
        place-items: center;
      }

      .hero {
        width: min(720px, 92vw);
        transform: translateY(-8vh);
        display: flex;
        justify-content: center; /* centers hero-inner block */
      }

      /* wrap title + input together */
      .hero-inner {
        display: inline-block;
        text-align: left; /* left edge aligns title and cursor */
      }

      .title {
        font-size: clamp(32px, 5vw, 56px);
        font-weight: 400;
        letter-spacing: -0.02em;
        margin: 0 0 18px 0;
        text-align: center; /* title centered, but left edge stays consistent for input alignment */
      }

      /* Input line that looks like a typing prompt */
      .prompt {
        display: inline-flex;
        align-items: center;
        justify-content: flex-start; /* left aligned */
        gap: 4px;
        font-size: clamp(22px, 3vw, 32px); /* increased user input size */
        line-height: 1.2;
        min-height: 38px;
        min-width: 320px;
      }

      /* Hidden real input, to capture typing */
      .hidden-input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
        width: 1px;
        height: 1px;
      }

      .typed {
        white-space: pre;
      }

      .cursor {
        display: inline-block;
        font-size: 1em; /* match text height */
        line-height: 1;
        font-weight: 400;
        width: 0.6em;
        color: var(--text);
        transform: translateY(1px);
        animation: blink 1s steps(1, end) infinite;
      }

      @keyframes blink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }

      /* Make the whole area clickable to start typing */
      .click-catcher {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 12px;
      }

      .click-catcher:focus-visible {
        outline: 2px solid rgba(0, 0, 0, 0.25);
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero" aria-label="Landing">
        <div class="hero-inner">
          <h1 class="title">find your dream job</h1>

          <div class="click-catcher" id="catcher" tabindex="0" role="button" aria-label="Type your goal">
            <div class="prompt" aria-live="polite">
              <span class="typed" id="typed"></span>
              <span class="cursor" aria-hidden="true">|</span>
            </div>
          </div>
        </div>

        <input
          id="realInput"
          class="hidden-input"
          type="text"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
        />
      </section>
    </main>

    <script>
      const catcher = document.getElementById("catcher");
      const realInput = document.getElementById("realInput");
      const typedEl = document.getElementById("typed");

      function focusInput() {
        realInput.focus();
      }

      catcher.addEventListener("click", focusInput);
      catcher.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          focusInput();
        }
      });

      realInput.addEventListener("input", () => {
        typedEl.textContent = realInput.value;
      });

      realInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const value = realInput.value.trim();
          if (!value) return;
            window.location.href = `/results?q=${encodeURIComponent(value)}`;
        } else if (e.key === "Escape") {
          realInput.value = "";
          typedEl.textContent = "";
        }
      });

      window.addEventListener("load", focusInput);
    </script>
  </body>
</html>
